name: Deploy

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: backend/go.sum

      - name: Build backend
        working-directory: backend
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: 0
        run: go build -o server main.go

      - name: Deploy to server
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_IP: ${{ secrets.SERVER_IP }}
        run: |
          echo "$SSH_PRIVATE_KEY" > key.pem
          chmod 600 key.pem

          # Deploy frontend static files
          rsync -az --delete -e "ssh -i key.pem -o StrictHostKeyChecking=no" \
            frontend/dist/ \
            $SERVER_USER@$SERVER_IP:/var/www/html/

          # Deploy backend binary
          scp -i key.pem -o StrictHostKeyChecking=no \
            backend/server \
            $SERVER_USER@$SERVER_IP:/home/$SERVER_USER/backend/server

          # Restart backend service
          ssh -i key.pem -o StrictHostKeyChecking=no $SERVER_USER@$SERVER_IP \
            "sudo systemctl restart katz-paintings"

          rm -f key.pem
